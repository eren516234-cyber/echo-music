name: Build YVL Music APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Patch package.json (resolve catalog & workspace refs)
        working-directory: artifacts/mobile
        run: |
          node - << 'JS'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          // catalog pinned versions
          const catalog = {
            "@tanstack/react-query": "^5.90.21",
            "react": "19.1.0",
            "react-dom": "19.1.0",
            "zod": "^3.25.76"
          };
          // workspace packages to remove (not needed for APK)
          const removeWs = ["@workspace/api-client-react"];
          for (const section of ["dependencies", "devDependencies"]) {
            if (!pkg[section]) continue;
            for (const [k, v] of Object.entries(pkg[section])) {
              if (v === "catalog:") pkg[section][k] = catalog[k] || "latest";
              if (v.startsWith("workspace:")) delete pkg[section][k];
            }
            for (const rm of removeWs) delete pkg[section][rm];
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log("Patched package.json");
          JS

      - name: Install mobile dependencies
        working-directory: artifacts/mobile
        run: npm install --legacy-peer-deps

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Expo prebuild Android
        working-directory: artifacts/mobile
        run: npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_TELEMETRY: 1
          EXPO_NO_GIT_STATUS: 1

      - name: Build debug APK
        working-directory: artifacts/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --max-workers 2
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3g -Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YVL-Music-APK
          path: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ YVL Music APK Ready!" >> $GITHUB_STEP_SUMMARY
          echo "Download from **Artifacts** tab above." >> $GITHUB_STEP_SUMMARY
          echo "Package: com.yvl.music" >> $GITHUB_STEP_SUMMARY
